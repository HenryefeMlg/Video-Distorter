<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Games Video Distorter</title>
    <style>
        :root {
            --bg-color: #08080c;
            --panel-color: #12121a;
            --accent-color: #ff1f53;
            --text-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(255,31,83,0.15) 0%, rgba(0,0,0,0) 100%);
        }

        h1 {
            margin: 0;
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 15px var(--accent-color);
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 1200px;
            gap: 20px;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
        }

        .workspace {
            flex: 2;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            border: 1px solid #1f1f2e;
        }

        canvas {
            max-width: 100%;
            max-height: 600px;
            border-radius: 4px;
        }

        #sourceVideo {
            display: none;
        }

        .controls-panel {
            flex: 1;
            background-color: var(--panel-color);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #1f1f2e;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #a0aec0;
        }

        .custom-num-input {
            width: 70px;
            background-color: #08080c;
            border: 1px solid #29293d;
            color: var(--accent-color);
            font-family: monospace;
            font-size: 0.95rem;
            padding: 4px;
            border-radius: 4px;
            text-align: center;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: #08080c;
            color: #fff;
            border: 1px solid #29293d;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(255,31,83,0.4);
        }

        .btn-secondary {
            background-color: #29293d;
        }

        .btn-secondary:hover {
            background-color: #383854;
            box-shadow: none;
        }

        .template-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 4px;
        }

        .btn-template {
            background-color: #1c1c28;
            color: #a0aec0;
            border: 1px solid #29293d;
            padding: 8px 4px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .btn-template:hover {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        #fileInput {
            display: none;
        }

        .placeholder-text {
            color: #718096;
            text-align: center;
        }

        hr {
            border: 0;
            border-top: 1px solid #1f1f2e;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Henry Games Video Distorter</h1>
    </header>

    <div class="container">
        <div class="workspace">
            <div id="placeholder" class="placeholder-text">
                <p>Lütfen düzenlemek için bir video yükleyin</p>
                <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Video Seç</button>
            </div>
            <video id="sourceVideo" loop crossorigin="anonymous"></video>
            <canvas id="outputCanvas" style="display: none;"></canvas>
        </div>

        <div class="controls-panel">
            <input type="file" id="fileInput" accept="video/*">
            
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                📁 Yeni Video Yükle
            </button>

            <hr>

            <div class="control-group">
                <div class="label-row">Video Renk Filtresi</div>
                <select id="filterType">
                    <option value="none">Normal</option>
                    <option value="cyberpunk">Cyberpunk (Neon Kırmızı/Mavi)</option>
                    <option value="radioactive">Radioactive (Zehirli Yeşil)</option>
                    <option value="deepfry">Deep Fried (Aşırı Doygun Kızartma)</option>
                    <option value="monochrome">Monokrom (Siyah / Beyaz Parazit)</option>
                </select>
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span>Görüntü Kontrastı (%)</span>
                    <input type="number" id="contrastNum" class="custom-num-input" value="100" min="0">
                </div>
                <input type="range" id="contrastRange" min="0" max="2000" value="100">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span>Ses Bozulma (Earrape %)</span>
                    <input type="number" id="audioDistNum" class="custom-num-input" value="100" min="0">
                </div>
                <input type="range" id="audioDistRange" min="0" max="5000" value="100">
                
                <div class="template-container">
                    <button class="btn-template" onclick="setAudioCustomValue(10)">%10</button>
                    <button class="btn-template" onclick="setAudioCustomValue(100)">%100</button>
                    <button class="btn-template" onclick="setAudioCustomValue(1000)">%1000</button>
                    <button class="btn-template" onclick="setAudioCustomValue(2000)">%2000</button>
                </div>
            </div>

            <hr>

            <button class="btn" id="downloadBtn" style="background-color: #10b981; display: none;">
                💾 Videoyu Anında İndir (MP4)
            </button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const sourceVideo = document.getElementById('sourceVideo');
        const outputCanvas = document.getElementById('outputCanvas');
        const ctx = outputCanvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const downloadBtn = document.getElementById('downloadBtn');

        const filterType = document.getElementById('filterType');
        const contrastRange = document.getElementById('contrastRange');
        const audioDistRange = document.getElementById('audioDistRange');
        
        const contrastNum = document.getElementById('contrastNum');
        const audioDistNum = document.getElementById('audioDistNum');

        let animationFrameId;
        let currentFileBlob = null; // Yüklenen ham video dosyasını tutar

        let audioCtx;
        let audioSource;
        let distortionNode;
        let gainNode;

        contrastRange.addEventListener('input', (e) => { contrastNum.value = e.target.value; });
        contrastNum.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value) || 0;
            contrastRange.value = Math.min(val, 2000); 
        });

        audioDistRange.addEventListener('input', (e) => {
            audioDistNum.value = e.target.value;
            updateAudioDistortion(parseFloat(e.target.value));
        });
        audioDistNum.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value) || 0;
            audioDistRange.value = Math.min(val, 5000);
            updateAudioDistortion(val);
        });

        function setAudioCustomValue(value) {
            audioDistRange.value = value;
            audioDistNum.value = value;
            updateAudioDistortion(value);
        }

        function makeDistortionCurve(amount) {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0 ; i < n_samples; ++i ) {
                const x = (i * 2) / n_samples - 1;
                curve[i] = ( (3 + k) * x * 90 * deg ) / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        function initAudio() {
            if (audioCtx) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioSource = audioCtx.createMediaElementSource(sourceVideo);
            distortionNode = audioCtx.createWaveShaper();
            gainNode = audioCtx.createGain();

            distortionNode.curve = makeDistortionCurve(0);
            distortionNode.oversample = '4x';

            audioSource.connect(distortionNode);
            distortionNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        }

        function updateAudioDistortion(intensity) {
            if (!distortionNode || !gainNode) return;
            if (intensity <= 100) {
                distortionNode.curve = makeDistortionCurve(0);
                gainNode.gain.value = 1.0;
            } else {
                const distortionAmount = (intensity - 100) * 3.5; 
                distortionNode.curve = makeDistortionCurve(distortionAmount);
                gainNode.gain.value = 1.0 + ((intensity - 100) / 100) * 0.5;
            }
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                currentFileBlob = file; // Ham dosyayı sakla
                const fileURL = URL.createObjectURL(file);
                sourceVideo.src = fileURL;
                placeholder.style.display = 'none';
                
                sourceVideo.addEventListener('loadedmetadata', () => {
                    outputCanvas.width = sourceVideo.videoWidth;
                    outputCanvas.height = sourceVideo.videoHeight;
                    outputCanvas.style.display = 'block';
                    downloadBtn.style.display = 'block';
                    
                    initAudio();
                    if (audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    updateAudioDistortion(parseFloat(audioDistNum.value));
                    sourceVideo.play().catch(err => console.log(err));
                    renderTimeline();
                });
            }
        });

        function processFrame(contrastValue, filter) {
            const w = outputCanvas.width;
            const h = outputCanvas.height;
            if (filter !== 'none' || contrastValue !== 100) {
                const imgData = ctx.getImageData(0, 0, w, h);
                const data = imgData.data;
                const contrastFactor = contrastValue / 100; 

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i]; let g = data[i+1]; let b = data[i+2];
                    if (contrastValue !== 100) {
                        r = ((r / 255 - 0.5) * contrastFactor + 0.5) * 255;
                        g = ((g / 255 - 0.5) * contrastFactor + 0.5) * 255;
                        b = ((b / 255 - 0.5) * contrastFactor + 0.5) * 255;
                    }
                    if (filter === 'cyberpunk') { r = r * 1.8; g = g * 0.1; b = b * 2.2; }
                    else if (filter === 'radioactive') { r = r * 0.2; g = g * 3.0; b = b * 0.1; }
                    else if (filter === 'deepfry') {
                        r = r > 128 ? r * 2.5 : r * 0.4;
                        g = g > 128 ? g * 2.0 : g * 0.2;
                        b = b < 128 ? b * 0.1 : b * 1.2;
                    } else if (filter === 'monochrome') {
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        const thresh = gray > 128 ? 255 : 0;
                        const blendFactor = Math.min(1, contrastValue / 500);
                        r = g = b = (gray * (1 - blendFactor) + thresh * blendFactor);
                    }
                    data[i] = Math.min(255, Math.max(0, r));
                    data[i+1] = Math.min(255, Math.max(0, g));
                    data[i+2] = Math.min(255, Math.max(0, b));
                }
                ctx.putImageData(imgData, 0, 0);
            }
        }

        function renderTimeline() {
            if (sourceVideo.paused || sourceVideo.ended) {
                animationFrameId = requestAnimationFrame(renderTimeline);
                return;
            }
            ctx.drawImage(sourceVideo, 0, 0, outputCanvas.width, outputCanvas.height);
            processFrame(parseFloat(contrastNum.value), filterType.value);
            animationFrameId = requestAnimationFrame(renderTimeline);
        }

        // --- DÜMDÜZ ANINDA 0 SANİYEDE İNDİRME SİSTEMİ ---
        downloadBtn.addEventListener('click', () => {
            if (!currentFileBlob) return;

            // Bekleme yok! Ham video verisini (Blob) doğrudan alıp anında indirmeyi tetikliyoruz
            const url = URL.createObjectURL(currentFileBlob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'henry-games-instant-' + audioDistNum.value + 'dist.mp4';
            document.body.appendChild(a);
            a.click();
            
            // Temizlik
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
