<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Games Video Distorter</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-color: #1a1a24;
            --accent-color: #ff3366;
            --text-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(255,51,102,0.1) 0%, rgba(0,0,0,0) 100%);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 1200px;
            gap: 20px;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
        }

        .workspace {
            flex: 2;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #2d2d3d;
        }

        canvas {
            max-width: 100%;
            max-height: 600px;
            border-radius: 4px;
        }

        #sourceVideo {
            display: none;
        }

        .controls-panel {
            flex: 1;
            background-color: var(--panel-color);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid #2d2d3d;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #a0aec0;
            display: flex;
            justify-content: space-between;
        }

        label span {
            color: var(--accent-color);
            font-family: monospace;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        select {
            width: 100%;
            padding: 10px;
            background-color: #0f0f12;
            color: #fff;
            border: 1px solid #3d3d5d;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255,51,102,0.4);
        }

        .btn-secondary {
            background-color: #3d3d5d;
        }

        .btn-secondary:hover {
            background-color: #4d4d6d;
            box-shadow: none;
        }

        #fileInput {
            display: none;
        }

        .placeholder-text {
            color: #718096;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Henry Games Video Distorter</h1>
    </header>

    <div class="container">
        <div class="workspace">
            <div id="placeholder" class="placeholder-text">
                <p>Lütfen düzenlemek için bir video yükleyin</p>
                <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Video Seç</button>
            </div>
            <video id="sourceVideo" loop crossorigin="anonymous"></video>
            <canvas id="outputCanvas" style="display: none;"></canvas>
        </div>

        <div class="controls-panel">
            <input type="file" id="fileInput" accept="video/*">
            
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                📁 Yeni Video Yükle
            </button>

            <hr style="border-color: #2d2d3d; margin: 10px 0;">

            <div class="control-group">
                <label>Görsel Distorsiyon (Dalga) <span id="distVal">%0</span></label>
                <input type="range" id="distortionRange" min="0" max="800" value="0">
            </div>

            <div class="control-group">
                <label>Video Renk Filtresi</label>
                <select id="filterType">
                    <option value="none">Normal</option>
                    <option value="cyberpunk">Cyberpunk (Neon Kırmızı/Mavi)</option>
                    <option value="radioactive">Radioactive (Zehirli Yeşil)</option>
                    <option value="deepfry">Deep Fried (Aşırı Doygun)</option>
                    <option value="monochrome">Monokrom (Yüksek Kontrast Siyah/Beyaz)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Yoğunluk & Ses Bozulması (Crispy) <span id="intensityVal">%100</span></label>
                <input type="range" id="intensityRange" min="0" max="500" value="100">
            </div>

            <button class="btn" id="downloadBtn" style="background-color: #10b981; display: none;">
                💾 Bozulmuş Videoyu İndir
            </button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const sourceVideo = document.getElementById('sourceVideo');
        const outputCanvas = document.getElementById('outputCanvas');
        const ctx = outputCanvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const downloadBtn = document.getElementById('downloadBtn');

        const distortionRange = document.getElementById('distortionRange');
        const filterType = document.getElementById('filterType');
        const intensityRange = document.getElementById('intensityRange');

        const distVal = document.getElementById('distVal');
        const intensityVal = document.getElementById('intensityVal');

        let animationFrameId;
        let mediaRecorder;
        let recordedChunks = [];

        // Web Audio API Değişkenleri
        let audioCtx;
        let audioSource;
        let distortionNode;
        let gainNode;
        let audioDestination; // Kayıt sistemi için

        distortionRange.addEventListener('input', (e) => distVal.textContent = `%${e.target.value}`);
        
        intensityRange.addEventListener('input', (e) => {
            intensityVal.textContent = `%${e.target.value}`;
            updateAudioDistortion(parseFloat(e.target.value));
        });

        // Ses Bozulma Algoritması (WaveShaper Eğrisi)
        function makeDistortionCurve(amount) {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0 ; i < n_samples; ++i ) {
                const x = (i * 2) / n_samples - 1;
                // Matematiksel sinyal kırpma (Overdrive/Clipping) formülü
                curve[i] = ( (3 + k) * x * 20 * deg ) / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        // Ses Sitemini Başlatma (Kullanıcı etkileşimi şarttır)
        function initAudio() {
            if (audioCtx) return; 

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioSource = audioCtx.createMediaElementSource(sourceVideo);
            
            distortionNode = audioCtx.createWaveShaper();
            gainNode = audioCtx.createGain();
            audioDestination = audioCtx.createMediaStreamDestination();

            // Eğriyi oluştur ve bağla
            distortionNode.curve = makeDistortionCurve(0);
            distortionNode.oversample = '4x';

            // Ses Zinciri: Video -> Distorsiyon -> Kazanç(Ses Seviyesi) -> Hoparlör & Kayıt Cihazı
            audioSource.connect(distortionNode);
            distortionNode.connect(gainNode);
            
            // Hem bizim duyabilmemiz için hoparlörlere, hem de kaydetmek için sanal çıkışa bağlıyoruz
            gainNode.connect(audioCtx.destination);
            gainNode.connect(audioDestination);
        }

        // Yoğunluk değiştikçe sesi patlatma fonksiyonu
        function updateAudioDistortion(intensity) {
            if (!distortionNode || !gainNode) return;

            if (intensity <= 100) {
                // %100 ve altında orijinal temiz ses kalır
                distortionNode.curve = makeDistortionCurve(0);
                gainNode.gain.value = 1.0;
            } else {
                // %101 - %500 arasında ses kademeli olarak bass boosted ve earrape moduna girer
                const distortionAmount = (intensity - 100) * 1.5; 
                distortionNode.curve = makeDistortionCurve(distortionAmount);
                
                // Ses patladığı için kulakları tamamen sağır etmesin diye kazancı hafif dengeliyoruz 
                // ama yine de "crispy" / aşırı yüksek seviyede kalmasını sağlıyoruz
                gainNode.gain.value = 1.0 + ((intensity - 100) / 100) * 0.5;
            }
        }

        // Video Yükleme
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                sourceVideo.src = fileURL;
                placeholder.style.display = 'none';
                
                sourceVideo.addEventListener('loadedmetadata', () => {
                    outputCanvas.width = sourceVideo.videoWidth;
                    outputCanvas.height = sourceVideo.videoHeight;
                    outputCanvas.style.display = 'block';
                    downloadBtn.style.display = 'block';
                    
                    // Ses motorunu çalıştır ve videoyu oynat
                    initAudio();
                    audioCtx.resume();
                    updateAudioDistortion(parseFloat(intensityRange.value));
                    
                    sourceVideo.play();
                    renderTimeline();
                });
            }
        });

        // Görüntü Efekt Döngüsü
        function renderTimeline() {
            if (sourceVideo.paused || sourceVideo.ended) {
                animationFrameId = requestAnimationFrame(renderTimeline);
                return;
            }

            const w = outputCanvas.width;
            const h = outputCanvas.height;
            ctx.drawImage(sourceVideo, 0, 0, w, h);

            // 1. Distorsiyon (Pixel Shifting)
            const distAmp = parseFloat(distortionRange.value); 
            if (distAmp > 0) {
                const imgData = ctx.getImageData(0, 0, w, h);
                const srcData = new Uint8ClampedArray(imgData.data);
                const time = Date.now() * 0.005;
                const distortionStrength = (distAmp / 100) * 15; 

                for (let y = 0; y < h; y++) {
                    const shiftX = Math.floor(Math.sin((y / 30) + time) * distortionStrength);
                    for (let x = 0; x < w; x++) {
                        let srcX = x + shiftX;
                        if (srcX < 0) srcX = 0;
                        if (srcX >= w) srcX = w - 1;

                        const targetIdx = (y * w + x) * 4;
                        const srcIdx = (y * w + srcX) * 4;

                        imgData.data[targetIdx] = srcData[srcIdx];
                        imgData.data[targetIdx+1] = srcData[srcIdx+1];
                        imgData.data[targetIdx+2] = srcData[srcIdx+2];
                        imgData.data[targetIdx+3] = srcData[srcIdx+3];
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }

            // 2. Renk ve Yoğunluk (Crispy Görüntü)
            const intensity = parseFloat(intensityRange.value);
            const filter = filterType.value;

            if (filter !== 'none' || intensity !== 100) {
                const imgData = ctx.getImageData(0, 0, w, h);
                const data = imgData.data;
                const contrastFactor = intensity / 100; 

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i+1];
                    let b = data[i+2];

                    if (intensity !== 100) {
                        r = ((r / 255 - 0.5) * contrastFactor + 0.5) * 255;
                        g = ((g / 255 - 0.5) * contrastFactor + 0.5) * 255;
                        b = ((b / 255 - 0.5) * contrastFactor + 0.5) * 255;
                    }

                    if (filter === 'cyberpunk') {
                        r = r * 1.5; g = g * 0.2; b = b * 1.8;
                    } else if (filter === 'radioactive') {
                        r = r * 0.3; g = g * 2.5; b = b * 0.2;
                    } else if (filter === 'deepfry') {
                        r = r > 128 ? r * 2 : r * 0.5;
                        g = g > 128 ? g * 1.5 : g * 0.3;
                        b = b < 128 ? b * 0.2 : b * 0.8;
                    } else if (filter === 'monochrome') {
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        const thresh = gray > 128 ? 255 : 0;
                        r = g = b = (gray * (1 - (intensity/500)) + thresh * (intensity/500));
                    }

                    data[i] = Math.min(255, Math.max(0, r));
                    data[i+1] = Math.min(255, Math.max(0, g));
                    data[i+2] = Math.min(255, Math.max(0, b));
                }
                ctx.putImageData(imgData, 0, 0);
            }

            animationFrameId = requestAnimationFrame(renderTimeline);
        }

        // 3. Videoyu Kaydetme (Bozulmuş Görüntü + Bozulmuş Ses)
        downloadBtn.addEventListener('click', () => {
            if (downloadBtn.textContent.includes('Durdur')) {
                mediaRecorder.stop();
                return;
            }

            recordedChunks = [];
            
            // Canvas'tan 30 FPS video akışı al
            const canvasStream = outputCanvas.captureStream(30);
            
            // Web Audio API ile bozduğumuz sanal ses kanalını yakala ve videoya ekle
            const distortedAudioTrack = audioDestination.stream.getAudioTracks()[0];
            if (distortedAudioTrack) {
                canvasStream.addTrack(distortedAudioTrack);
            }

            mediaRecorder = new MediaRecorder(canvasStream, {
                mimeType: 'video/webm; codecs=vp9,opus'
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'henry-games-earrape-distorted.webm';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                downloadBtn.textContent = '💾 Bozulmuş Videoyu İndir';
                downloadBtn.style.backgroundColor = '#10b981';
                sourceVideo.pause();
            };

            downloadBtn.textContent = '🛑 Kaydı Durdur ve İndir';
            downloadBtn.style.backgroundColor = '#ef4444';
            sourceVideo.currentTime = 0;
            sourceVideo.play();
            mediaRecorder.start();

            sourceVideo.onended = () => {
                if (mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
            };
        });
    </script>
</body>
</html>
