<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Games Video Distorter</title>
    <style>
        :root {
            --bg-color: #08080c;
            --panel-color: #12121a;
            --accent-color: #ff1f53;
            --text-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(255,31,83,0.15) 0%, rgba(0,0,0,0) 100%);
        }

        h1 {
            margin: 0;
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 15px var(--accent-color);
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 1200px;
            gap: 20px;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .container { flex-direction: row; }
        }

        .workspace {
            flex: 2;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            border: 1px solid #1f1f2e;
        }

        canvas {
            max-width: 100%;
            max-height: 600px;
            border-radius: 4px;
        }

        #sourceVideo { display: none; }

        .controls-panel {
            flex: 1;
            background-color: var(--panel-color);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #1f1f2e;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #a0aec0;
        }

        .custom-num-input {
            width: 70px;
            background-color: #08080c;
            border: 1px solid #29293d;
            color: var(--accent-color);
            font-family: monospace;
            font-size: 0.95rem;
            padding: 4px;
            border-radius: 4px;
            text-align: center;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: #08080c;
            color: #fff;
            border: 1px solid #29293d;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(255,31,83,0.4);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .btn-secondary { background-color: #29293d; }
        .btn-secondary:hover:not(:disabled) { background-color: #383854; box-shadow: none; }

        .btn-mosh {
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(217, 70, 239, 0.3);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .btn-mosh:active:not(:disabled) {
            transform: scale(0.97);
            background: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%);
        }

        .template-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 4px;
        }

        .btn-template {
            background-color: #1c1c28;
            color: #a0aec0;
            border: 1px solid #29293d;
            padding: 8px 4px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .btn-template:hover {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        #fileInput { display: none; }
        .placeholder-text { color: #718096; text-align: center; }
        hr { border: 0; border-top: 1px solid #1f1f2e; margin: 5px 0; }
    </style>
</head>
<body>

    <header>
        <h1>Henry Games Video Distorter</h1>
    </header>

    <div class="container">
        <div class="workspace">
            <div id="placeholder" class="placeholder-text">
                <p>Lütfen düzenlemek için bir video yükleyin</p>
                <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Video Seç</button>
            </div>
            <video id="sourceVideo" loop crossorigin="anonymous"></video>
            <canvas id="outputCanvas" style="display: none;"></canvas>
        </div>

        <div class="controls-panel">
            <input type="file" id="fileInput" accept="video/*">
            
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                📁 Yeni Video Yükle
            </button>

            <hr>

            <div class="control-group">
                <div class="label-row">Video Renk Filtresi</div>
                <select id="filterType">
                    <option value="none">Normal</option>
                    <option value="cyberpunk">Cyberpunk (Neon Kırmızı/Mavi)</option>
                    <option value="radioactive">Radioactive (Zehirli Yeşil)</option>
                    <option value="deepfry">Deep Fried (Aşırı Doygun Kızartma)</option>
                    <option value="monochrome">Monokrom (Siyah / Beyaz Parazit)</option>
                </select>
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span>Görüntü Kontrastı (%)</span>
                    <input type="number" id="contrastNum" class="custom-num-input" value="100" min="0">
                </div>
                <input type="range" id="contrastRange" min="0" max="2000" value="100">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span>Ses Bozulma (Earrape %)</span>
                    <input type="number" id="audioDistNum" class="custom-num-input" value="100" min="0">
                </div>
                <input type="range" id="audioDistRange" min="0" max="5000" value="100">
                
                <div class="template-container">
                    <button class="btn-template" onclick="setAudioCustomValue(10)">%10</button>
                    <button class="btn-template" onclick="setAudioCustomValue(100)">%100</button>
                    <button class="btn-template" onclick="setAudioCustomValue(1000)">%1000</button>
                    <button class="btn-template" onclick="setAudioCustomValue(2000)">%2000</button>
                </div>
            </div>

            <!-- Sayfa açıldığı andan itibaren panellerde görünür duran Datamosh butonu -->
            <button class="btn btn-mosh" id="moshBtn" disabled>
                ⚡ BASILI TUT: 0.1s Loop | BIRAK: 3s Datamosh
            </button>

            <hr>

            <button class="btn" id="downloadBtn" style="background-color: #10b981; display: none;">
                💾 Başa Al, Oynat ve Kaydet (MP4)
            </button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const sourceVideo = document.getElementById('sourceVideo');
        const outputCanvas = document.getElementById('outputCanvas');
        const ctx = outputCanvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const downloadBtn = document.getElementById('downloadBtn');
        const moshBtn = document.getElementById('moshBtn');

        const filterType = document.getElementById('filterType');
        const contrastRange = document.getElementById('contrastRange');
        const audioDistRange = document.getElementById('audioDistRange');
        
        const contrastNum = document.getElementById('contrastNum');
        const audioDistNum = document.getElementById('audioDistNum');

        let animationFrameId;
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        let audioCtx;
        let audioSource;
        let distortionNode;
        let gainNode;
        let audioDestination;

        let isMoshing = false;
        let loopStartTime = 0;
        let loopInterval = null;
        let moshBlendFrames = 0;
        let frozenFrameData = null;

        contrastRange.addEventListener('input', (e) => { contrastNum.value = e.target.value; });
        contrastNum.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value) || 0;
            contrastRange.value = Math.min(val, 2000); 
        });

        audioDistRange.addEventListener('input', (e) => {
            audioDistNum.value = e.target.value;
            updateAudioDistortion(parseFloat(e.target.value));
        });
        audioDistNum.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value) || 0;
            audioDistRange.value = Math.min(val, 5000);
            updateAudioDistortion(val);
        });

        function setAudioCustomValue(value) {
            audioDistRange.value = value;
            audioDistNum.value = value;
            updateAudioDistortion(value);
        }

        function makeDistortionCurve(amount) {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0 ; i < n_samples; ++i ) {
                const x = (i * 2) / n_samples - 1;
                curve[i] = ( (3 + k) * x * 90 * deg ) / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        function initAudio() {
            if (audioCtx) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioSource = audioCtx.createMediaElementSource(sourceVideo);
            distortionNode = audioCtx.createWaveShaper();
            gainNode = audioCtx.createGain();
            audioDestination = audioCtx.createMediaStreamDestination();

            distortionNode.curve = makeDistortionCurve(0);
            distortionNode.oversample = '4x';

            audioSource.connect(distortionNode);
            distortionNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.connect(audioDestination);
        }

        function updateAudioDistortion(intensity) {
            if (!distortionNode || !gainNode) return;
            if (intensity <= 100) {
                distortionNode.curve = makeDistortionCurve(0);
                gainNode.gain.value = 1.0;
            } else {
                const distortionAmount = (intensity - 100) * 4.0; 
                distortionNode.curve = makeDistortionCurve(distortionAmount);
                gainNode.gain.value = 1.0 + ((intensity - 100) / 100) * 0.6;
            }
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                sourceVideo.src = fileURL;
                placeholder.style.display = 'none';
                
                sourceVideo.addEventListener('loadedmetadata', () => {
                    outputCanvas.width = sourceVideo.videoWidth;
                    outputCanvas.height = sourceVideo.videoHeight;
                    outputCanvas.style.display = 'block';
                    downloadBtn.style.display = 'block';
                    moshBtn.disabled = false; // Video yüklenince buton aktifleşir
                    
                    initAudio();
                    if (audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    updateAudioDistortion(parseFloat(audioDistNum.value));
                    sourceVideo.play().catch(err => console.log(err));
                    renderTimeline();
                });
            }
        });

        function startMosh() {
            if (isMoshing || moshBtn.disabled) return;
            isMoshing = true;
            loopStartTime = sourceVideo.currentTime;
            
            frozenFrameData = ctx.getImageData(0, 0, outputCanvas.width, outputCanvas.height);

            loopInterval = setInterval(() => {
                sourceVideo.currentTime = loopStartTime;
            }, 100);
        }

        function stopMosh() {
            if (!isMoshing || moshBtn.disabled) return;
            isMoshing = false;
            clearInterval(loopInterval);

            sourceVideo.currentTime = Math.min(sourceVideo.duration - 0.1, sourceVideo.currentTime + 3.0);
            moshBlendFrames = 15;
        }

        moshBtn.addEventListener('mousedown', startMosh);
        moshBtn.addEventListener('mouseup', stopMosh);
        moshBtn.addEventListener('mouseleave', stopMosh);
        moshBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startMosh(); });
        moshBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopMosh(); });

        function processFrame(contrastValue, filter) {
            const w = outputCanvas.width;
            const h = outputCanvas.height;
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            const contrastFactor = contrastValue / 100;

            if (moshBlendFrames > 0 && frozenFrameData) {
                const frozenPixels = frozenFrameData.data;
                const alpha = moshBlendFrames / 15;
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = data[i] * (1 - alpha) + frozenPixels[i] * alpha;
                    data[i+1] = data[i+1] * (1 - alpha) + frozenPixels[i+1] * alpha;
                    data[i+2] = data[i+2] * (1 - alpha) + frozenPixels[i+2] * alpha;
                }
                moshBlendFrames--;
            }

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i]; let g = data[i+1]; let b = data[i+2];

                if (contrastValue !== 100) {
                    r = ((r / 255 - 0.5) * contrastFactor + 0.5) * 255;
                    g = ((g / 255 - 0.5) * contrastFactor + 0.5) * 255;
                    b = ((b / 255 - 0.5) * contrastFactor + 0.5) * 255;
                }

                if (filter === 'cyberpunk') { r = r * 1.8; g = g * 0.1; b = b * 2.2; }
                else if (filter === 'radioactive') { r = r * 0.2; g = g * 3.0; b = b * 0.1; }
                else if (filter === 'deepfry') {
                    r = r > 128 ? r * 2.5 : r * 0.4; g = g > 128 ? g * 2.0 : g * 0.2; b = b < 128 ? b * 0.1 : b * 1.2;
                } else if (filter === 'monochrome') {
                    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                    const thresh = gray > 128 ? 255 : 0;
                    const blendFactor = Math.min(1, contrastValue / 500);
                    r = g = b = (gray * (1 - blendFactor) + thresh * blendFactor);
                }

                data[i] = Math.min(255, Math.max(0, r));
                data[i+1] = Math.min(255, Math.max(0, g));
                data[i+2] = Math.min(255, Math.max(0, b));
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function renderTimeline() {
            if (sourceVideo.paused || sourceVideo.ended) {
                animationFrameId = requestAnimationFrame(renderTimeline);
                return;
            }
            ctx.drawImage(sourceVideo, 0, 0, outputCanvas.width, outputCanvas.height);
            processFrame(parseFloat(contrastNum.value), filterType.value);
            animationFrameId = requestAnimationFrame(renderTimeline);
        }

        downloadBtn.addEventListener('click', () => {
            if (isRecording) return;
            isRecording = true;
            recordedChunks = [];

            const canvasStream = outputCanvas.captureStream(30);
            if (audioDestination && audioDestination.stream) {
                const distortedAudioTrack = audioDestination.stream.getAudioTracks()[0];
                if (distortedAudioTrack) canvasStream.addTrack(distortedAudioTrack);
            }

            let options = { mimeType: 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm; codecs=vp9,opus' };
            }

            mediaRecorder = new MediaRecorder(canvasStream, options);
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'henry-games-datamoshed.mp4';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                sourceVideo.loop = true;
                isRecording = false;
                
                downloadBtn.textContent = '💾 Başa Al, Oynat ve Kaydet (MP4)';
                downloadBtn.style.backgroundColor = '#10b981';
                downloadBtn.disabled = false;
                sourceVideo.play().catch(() => {});
            };

            downloadBtn.textContent = '🔴 Başa Alınıyor ve Kaydediliyor...';
            downloadBtn.style.backgroundColor = '#ef4444';
            downloadBtn.disabled = true;

            sourceVideo.loop = false;
            sourceVideo.currentTime = 0;
            
            sourceVideo.onseeked = () => {
                sourceVideo.onseeked = null; 
                sourceVideo.play().then(() => {
                    mediaRecorder.start(500);
                }).catch(err => console.log(err));
            };

            sourceVideo.onended = () => {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
            };
        });
    </script>
</body>
</html>
